name: Self-Host Release Deploy

on:
  release:
    types:
      - published

permissions:
  contents: read

env:
  TAILSCALE_TAGS: ${{ secrets.TAILSCALE_TAGS != '' && secrets.TAILSCALE_TAGS || 'tag:ci' }}
  TAILSCALE_OAUTH_CLIENT_ID_PRESENT: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID != '' }}
  TAILSCALE_OAUTH_SECRET_PRESENT: ${{ secrets.TAILSCALE_OAUTH_SECRET != '' }}

concurrency:
  group: self-host-release-deploy-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  deploy:
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Join Tailscale network (OAuth client)
        if: ${{ env.TAILSCALE_OAUTH_CLIENT_ID_PRESENT == 'true' && env.TAILSCALE_OAUTH_SECRET_PRESENT == 'true' }}
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: ${{ env.TAILSCALE_TAGS }}
          hostname: github-actions-damit-release-deploy
          ping: ${{ secrets.SELF_HOST_TAILNET_HOST }}

      - name: Join Tailscale network (Auth key fallback)
        if: ${{ env.TAILSCALE_OAUTH_CLIENT_ID_PRESENT != 'true' || env.TAILSCALE_OAUTH_SECRET_PRESENT != 'true' }}
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: github-actions-damit-release-deploy
          ping: ${{ secrets.SELF_HOST_TAILNET_HOST }}

      - name: Start SSH agent
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SELF_HOST_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s' "$SSH_PRIVATE_KEY" > ~/.ssh/github_actions_deploy_key
          printf '
' >> ~/.ssh/github_actions_deploy_key
          python - <<'PY'
          from pathlib import Path
          key_path = Path.home() / '.ssh' / 'github_actions_deploy_key'
          content = key_path.read_text(encoding='utf-8')
          key_path.write_text(content.replace('
', '
').replace('', '
'), encoding='utf-8')
          PY
          chmod 600 ~/.ssh/github_actions_deploy_key
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/github_actions_deploy_key
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

      - name: Trust server host key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.SELF_HOST_SSH_PORT }}" "${{ secrets.SELF_HOST_TAILNET_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync repository
        shell: bash
        run: |
          set -euo pipefail
          rsync -az --delete             --filter='P deploy/homelab/.env'             --exclude '.git/'             --exclude 'node_modules/'             --exclude 'data/'             --exclude 'output/'             --exclude '.fly-config/'             ./ "${{ secrets.SELF_HOST_SSH_USER }}@${{ secrets.SELF_HOST_TAILNET_HOST }}:${{ secrets.SELF_HOST_APP_DIR }}/"

      - name: Deploy on server
        shell: bash
        run: |
          set -euo pipefail
          ssh -p "${{ secrets.SELF_HOST_SSH_PORT }}" "${{ secrets.SELF_HOST_SSH_USER }}@${{ secrets.SELF_HOST_TAILNET_HOST }}"             "cd '${{ secrets.SELF_HOST_APP_DIR }}' && bash ./deploy/homelab/deploy.sh"

      - name: Build release metadata file
        shell: bash
        run: |
          set -euo pipefail
          cat > .release-version <<EOF
          TAG=${{ github.event.release.tag_name }}
          NAME=${{ github.event.release.name }}
          TARGET=${{ github.event.release.target_commitish }}
          SHA=${{ github.sha }}
          PUBLISHED_AT=${{ github.event.release.published_at }}
          EOF

      - name: Upload release metadata
        shell: bash
        run: |
          set -euo pipefail
          scp -P "${{ secrets.SELF_HOST_SSH_PORT }}" .release-version "${{ secrets.SELF_HOST_SSH_USER }}@${{ secrets.SELF_HOST_TAILNET_HOST }}:${{ secrets.SELF_HOST_APP_DIR }}/.release-version"

      - name: Smoke check on server
        shell: bash
        run: |
          set -euo pipefail
          ssh -p "${{ secrets.SELF_HOST_SSH_PORT }}" "${{ secrets.SELF_HOST_SSH_USER }}@${{ secrets.SELF_HOST_TAILNET_HOST }}"             "cd '${{ secrets.SELF_HOST_APP_DIR }}' && bash ./deploy/homelab/smoke.sh"
