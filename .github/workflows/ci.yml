name: CI

on:
  push:
    branches:
      - main
      - master
      - codex/**
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: API regression
        run: node tests/api.test.js

      - name: Auth regression
        run: node tests/auth-foundation.test.js

      - name: Workspace session regression
        run: node tests/workspace-session.test.js

      - name: Customer confirmation regression
        run: node tests/customer-confirmation.test.js

      - name: Local restore rehearsal regression
        run: node tests/local-restore-rehearsal.test.js
