name: Preview Customer Notification Smoke

on:
  workflow_dispatch:
    inputs:
      phone:
        description: "Test phone number for preview customer notification smoke"
        required: true
        type: string

permissions:
  contents: read

env:
  TAILSCALE_TAGS: ${{ secrets.TAILSCALE_TAGS != '' && secrets.TAILSCALE_TAGS || 'tag:ci' }}
  TAILSCALE_OAUTH_READY: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID != '' && secrets.TAILSCALE_OAUTH_SECRET != '' }}

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Join Tailscale network (OAuth client)
        if: ${{ env.TAILSCALE_OAUTH_READY == 'true' }}
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: ${{ env.TAILSCALE_TAGS }}
          hostname: github-actions-damit-preview-notify-smoke
          ping: ${{ secrets.SELF_HOST_TAILNET_HOST }}

      - name: Join Tailscale network (Auth key fallback)
        if: ${{ env.TAILSCALE_OAUTH_READY != 'true' }}
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: github-actions-damit-preview-notify-smoke
          ping: ${{ secrets.SELF_HOST_TAILNET_HOST }}

      - name: Prepare deploy key
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' '${{ secrets.SELF_HOST_SSH_KEY }}' > ~/.ssh/github_actions_deploy_key
          chmod 600 ~/.ssh/github_actions_deploy_key

      - name: Trust server host key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.SELF_HOST_SSH_PORT }}" "${{ secrets.SELF_HOST_TAILNET_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync repository
        shell: bash
        run: |
          set -euo pipefail
          rsync -az --delete \
            -e "ssh -i ~/.ssh/github_actions_deploy_key -p ${{ secrets.SELF_HOST_SSH_PORT }}" \
            --filter='P deploy/homelab/.env' \
            --filter='P deploy/homelab/.env.preview-postgres' \
            --exclude '.git/' \
            --exclude 'node_modules/' \
            --exclude 'data/' \
            --exclude 'data-preview-postgres/' \
            --exclude 'output/' \
            --exclude '.fly-config/' \
            ./ "${{ secrets.SELF_HOST_SSH_USER }}@${{ secrets.SELF_HOST_TAILNET_HOST }}:${{ secrets.SELF_HOST_APP_DIR }}/"

      - name: Ensure preview Postgres stack on server
        shell: bash
        env:
          PREVIEW_POSTGRES_DATABASE_URL: ${{ secrets.PREVIEW_POSTGRES_DATABASE_URL }}
          PREVIEW_POSTGRES_SSL_MODE: ${{ secrets.PREVIEW_POSTGRES_SSL_MODE }}
          PREVIEW_POSTGRES_APPLICATION_NAME: ${{ secrets.PREVIEW_POSTGRES_APPLICATION_NAME }}
          PREVIEW_POSTGRES_POOL_MAX: ${{ secrets.PREVIEW_POSTGRES_POOL_MAX }}
        run: |
          set -euo pipefail
          db_url_q="$(printf '%q' "${PREVIEW_POSTGRES_DATABASE_URL:-}")"
          ssl_mode_q="$(printf '%q' "${PREVIEW_POSTGRES_SSL_MODE:-}")"
          app_name_q="$(printf '%q' "${PREVIEW_POSTGRES_APPLICATION_NAME:-}")"
          pool_max_q="$(printf '%q' "${PREVIEW_POSTGRES_POOL_MAX:-}")"
          ssh -i ~/.ssh/github_actions_deploy_key -p "${{ secrets.SELF_HOST_SSH_PORT }}" "${{ secrets.SELF_HOST_SSH_USER }}@${{ secrets.SELF_HOST_TAILNET_HOST }}" \
            "cd '${{ secrets.SELF_HOST_APP_DIR }}' && DATABASE_URL=${db_url_q} POSTGRES_SSL_MODE=${ssl_mode_q} POSTGRES_APPLICATION_NAME=${app_name_q} POSTGRES_POOL_MAX=${pool_max_q} bash ./deploy/homelab/refresh-preview-postgres-stack.sh"

      - name: Smoke preview public route on server
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/github_actions_deploy_key -p "${{ secrets.SELF_HOST_SSH_PORT }}" "${{ secrets.SELF_HOST_SSH_USER }}@${{ secrets.SELF_HOST_TAILNET_HOST }}" \
            "cd '${{ secrets.SELF_HOST_APP_DIR }}' && bash deploy/homelab/run-preview-postgres-command.sh -- node scripts/customer-notification-provider-smoke.mjs --base-url=https://preview.damit.kr --phone='${{ inputs.phone }}' --require-auto=false"

      - name: Smoke preview local 3211 runtime on server
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/github_actions_deploy_key -p "${{ secrets.SELF_HOST_SSH_PORT }}" "${{ secrets.SELF_HOST_SSH_USER }}@${{ secrets.SELF_HOST_TAILNET_HOST }}" \
            "cd '${{ secrets.SELF_HOST_APP_DIR }}' && host_gateway=\$(ip route | awk '/default/ {print \$3; exit}') && bash deploy/homelab/run-preview-postgres-command.sh -- node scripts/customer-notification-provider-smoke.mjs --base-url=https://preview.damit.kr --runtime-base-url=http://\${host_gateway}:3211 --phone='${{ inputs.phone }}' --require-auto=false"
