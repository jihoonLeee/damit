services:
  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: damit-homelab-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 3000
      NODE_ENV: production
      DATA_DIR: /app/data
      UPLOAD_DIR: /app/data/uploads
      BACKUP_DIR: /app/data/backups
      DB_FILE_PATH: /app/data/app.sqlite
    ports:
      - "${APP_HOST_BIND:-127.0.0.1}:${APP_PORT:-3210}:3000"
    volumes:
      - ${DATA_BIND_DIR:-./data}:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/v1/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

