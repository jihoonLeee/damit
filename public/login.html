<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>다밋 로그인</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="auth-body">
  <div class="auth-shell">
    <section class="auth-panel">
      <div class="brand-lockup compact">
        <img class="brand-mark small" src="/damit-mark.svg" alt="다밋 로고" />
        <div>
          <p class="eyebrow brand-eyebrow">DAMIT</p>
          <strong class="brand-name small">다밋</strong>
        </div>
      </div>
      <h1>로그인</h1>
      <p class="auth-copy">이메일 매직 링크로 로그인합니다. 받은 링크를 열면 바로 운영 홈으로 이동합니다.</p>
      <p class="auth-strapline">설명은 빠르게, 기록은 분명하게.</p>

      <div id="invite-banner" class="auth-debug hidden"></div>

      <form id="challenge-form" class="stack auth-form">
        <label class="field">
          <span>이메일</span>
          <input type="email" id="email" placeholder="owner@company.com" required />
        </label>
        <button type="submit" class="primary-button action-emphasis">로그인 링크 보내기</button>
      </form>

      <form id="setup-form" class="stack auth-form hidden">
        <label class="field">
          <span>이름</span>
          <input type="text" id="displayName" placeholder="예: 김지훈" />
        </label>
        <label class="field">
          <span>회사 이름</span>
          <input type="text" id="companyName" placeholder="예: 다밋 클린" required />
        </label>
        <button type="submit" class="primary-button action-emphasis">계정과 회사 만들기</button>
      </form>

      <div id="auth-feedback" class="feedback" aria-live="polite"></div>
      <div id="debug-link" class="auth-debug hidden"></div>
      <div class="auth-links">
        <a href="/">랜딩으로 돌아가기</a>
        <a href="/home">운영 홈 보기</a>
      </div>
    </section>
  </div>
  <script type="module" src="/login.js"></script>
</body>
</html>
